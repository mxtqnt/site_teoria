<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento: Armaduras de Clave</title>
    <style>
        /* Resolve o problema do footer sendo empurrado para fora da tela */
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f4f4f9; --text-color: #333333; --accent-color: #ff00ff;
            --card-bg: #ffffff; --border-color: #dddddd; --hover-color: #fce6fc;
            --correct: #28a745; --incorrect: #dc3545;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e;
            --border-color: #333333; --hover-color: #3a1c3a;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color);
            color: var(--text-color); margin: 0; padding: 20px; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s;
        }
        
        .header-controls {
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; max-width: 800px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .filter-score-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ---------------------------------------------------
           CORREÇÃO: Elementos do cabeçalho com tamanho unificado 
           --------------------------------------------------- */
        .header-controls select, 
        .header-controls .back-btn, 
        .header-controls .score-board, 
        .header-controls #themeToggle {
            height: 45px; /* Altura fixa garante que fiquem idênticos */
            padding: 0 15px;
            border-radius: 8px; 
            border: 2px solid var(--border-color);
            background-color: var(--card-bg); 
            color: var(--text-color); 
            font-size: 1rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin: 0;
            font-family: inherit;
        }

        .header-controls select { cursor: pointer; }
        .header-controls select:focus { outline: none; border-color: var(--accent-color); }
        
        .header-controls .score-board { cursor: default; } /* Placar não é clicável */
        .header-controls .score-board span { color: var(--accent-color); margin: 0 4px; font-weight: bold; }

        .header-controls #themeToggle {
            font-size: 1.5rem; 
            border-color: var(--accent-color); 
            color: var(--accent-color); 
            cursor: pointer;
        }
        /* --------------------------------------------------- */

        .quiz-container {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 30px; text-align: center; max-width: 600px; width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px;
        }
        .image-container img {
            max-width: 100%; height: 150px; object-fit: contain; margin-bottom: 20px;
            background-color: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc;
        }
        .options-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        
        /* Estilos dos botões do Quiz mantidos intactos */
        button { cursor: pointer; font-family: inherit; }
        .option-btn {
            background-color: var(--card-bg); border: 2px solid var(--border-color); color: var(--text-color);
            padding: 15px; border-radius: 8px; transition: 0.2s; font-weight: 500; font-size: 1.05rem;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--accent-color); background-color: var(--hover-color); }
        .option-btn.correct { background-color: var(--correct); color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--incorrect); color: white; border-color: var(--incorrect); }
        .next-btn {
            margin-top: 20px; background-color: var(--accent-color); color: white;
            border: none; padding: 12px 24px; font-weight: bold; font-size: 1rem; border-radius: 8px; display: none; width: 100%;
        }
        .next-btn:hover { opacity: 0.9; }

        footer {
            margin-top: auto; padding: 30px 20px 10px; text-align: center;
            font-size: 0.9rem; color: var(--text-color); opacity: 0.8; width: 100%;
        }
        footer a { color: var(--accent-color); text-decoration: none; font-weight: bold; transition: opacity 0.3s; }
        footer a:hover { opacity: 0.7; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-controls">
        <a href="index.html" class="back-btn">← Voltar</a>
        
        <div class="filter-score-group">
            <select id="filtroModulo" onchange="resetarPlacar(); carregarQuestao();">
                <option value="ambos">Ambos (Sustenidos e Bemóis)</option>
                <option value="sustenidos">Apenas Sustenidos</option>
                <option value="bemois">Apenas Bemóis</option>
            </select>
            
            <div class="score-board">
                Pontuação: <span id="pontosAcertos">0</span> / <span id="pontosTotal">0</span>
            </div>
        </div>

        <button id="themeToggle" title="Alternar Tema">☾</button>
    </div>

    <div class="quiz-container">
        <h2>Identifique a Armadura de Clave</h2>
        <div class="image-container">
            <img id="imagemQuestao" src="" alt="Armadura de Clave">
        </div>
        <div class="options-grid" id="containerOpcoes"></div>
        <button id="btnProxima" class="next-btn" onclick="carregarQuestao()">Próxima Questão</button>
    </div>

    <footer>
        Desenvolvido por Ana Misque | Siga no Instagram: <a href="https://instagram.com/anamisque" target="_blank" rel="noopener noreferrer">@anamisque</a>
    </footer>

    <script>
        // Configuração de Tema com símbolos Unicode (Sol/Lua)
        const themeBtn = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀'; // Unicode de Sol
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.innerText = newTheme === 'dark' ? '☀' : '☾'; // Unicode de Sol e Lua
        });

        const baseDados = [
            { path: 'Armaduras - Bemóis/RebMaior.png', label: 'Ré Bemol Maior', tipo: 'bemois' },
            { path: 'Armaduras - Bemóis/SibMaior.png', label: 'Si Bemol Maior', tipo: 'bemois' },
            { path: 'Armaduras - Bemóis/SolbMaior.png', label: 'Sol Bemol Maior', tipo: 'bemois' },
            { path: 'Armaduras - Sustenido/DoSusMaior.png', label: 'Dó Sustenido Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/DoMaior.png', label: 'Dó Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/FaSusMaior.png', label: 'Fá Sustenido Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/LaMaior.png', label: 'Lá Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/MiMaior.png', label: 'Mi Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/ReMaior.png', label: 'Ré Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/SiMaior.png', label: 'Si Maior', tipo: 'sustenidos' },
            { path: 'Armaduras - Sustenido/SolMaior.png', label: 'Sol Maior', tipo: 'sustenidos' }
        ];

        let questaoAtual = null;
        let questaoAnterior = null;
        let acertos = 0;
        let total = 0;

        function embaralhar(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function resetarPlacar() {
            acertos = 0;
            total = 0;
            atualizarPlacarDOM();
            questaoAnterior = null;
        }

        function atualizarPlacarDOM() {
            document.getElementById('pontosAcertos').innerText = acertos;
            document.getElementById('pontosTotal').innerText = total;
        }

        function carregarQuestao() {
            document.getElementById('btnProxima').style.display = 'none';
            const filtro = document.getElementById('filtroModulo').value;
            
            let conjuntoFiltro = baseDados;
            if (filtro !== 'ambos') {
                conjuntoFiltro = baseDados.filter(item => item.tipo === filtro);
            }

            let novaQuestao;
            do {
                novaQuestao = conjuntoFiltro[Math.floor(Math.random() * conjuntoFiltro.length)];
            } while (conjuntoFiltro.length > 1 && novaQuestao === questaoAnterior);

            questaoAtual = novaQuestao;
            questaoAnterior = questaoAtual;
            
            document.getElementById('imagemQuestao').src = questaoAtual.path;

            let outrasOpcoes = baseDados.filter(item => item.label !== questaoAtual.label);
            outrasOpcoes = embaralhar(outrasOpcoes).slice(0, 5);

            let todasOpcoes = [...outrasOpcoes, questaoAtual];
            todasOpcoes = embaralhar(todasOpcoes);

            const containerOpcoes = document.getElementById('containerOpcoes');
            containerOpcoes.innerHTML = '';

            todasOpcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opcao.label;
                btn.onclick = () => verificarResposta(btn, opcao.label === questaoAtual.label);
                containerOpcoes.appendChild(btn);
            });
        }

        function verificarResposta(botaoClicado, isCorrect) {
            const botoes = document.querySelectorAll('.option-btn');
            botoes.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === questaoAtual.label) {
                    btn.classList.add('correct');
                }
            });

            total++;

            if (isCorrect) {
                acertos++;
            } else {
                botaoClicado.classList.add('wrong');
            }

            atualizarPlacarDOM();
            document.getElementById('btnProxima').style.display = 'inline-block';
        }

        window.onload = carregarQuestao;
    </script>
</body>
</html>
