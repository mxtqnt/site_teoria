<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Estudo Teórico-Musical</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --accent-color: #ff00ff;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --hover-color: #fce6fc;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --hover-color: #3a1c3a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { margin-bottom: 5px; }
        
        .subtitle {
            font-size: 1.1em;
            color: var(--accent-color);
            margin-top: 0;
        }

        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 30px 50px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .menu-btn:hover {
            border-color: var(--accent-color);
            background-color: var(--hover-color);
            transform: translateY(-2px);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .theme-toggle:hover {
            background-color: var(--accent-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">Alternar Tema</button>

    <header>
        <h1>Módulos de Treinamento Musical</h1>
        <p class="subtitle">Laboratório de Leitura e Percepção</p>
    </header>

    <div class="menu-container">
        <a href="notas.html" class="menu-btn">Leitura de Notas</a>
        <a href="armaduras.html" class="menu-btn">Armaduras de Clave</a>
    </div>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
