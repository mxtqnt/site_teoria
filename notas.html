<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento: Leitura de Notas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --accent-color: #ff00ff;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
            --hover-color: #fdf0fd;
            --control-bg: #f8f9fa;
            --correct: #28a745;
            --incorrect: #dc3545;
        }
        
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #2c2c2c;
            --hover-color: #3a1c3a;
            --control-bg: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        .header-controls {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            max-width: 800px; 
            margin-bottom: 20px;
            position: relative;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-score-group {
            display: flex;
            align-items: center;
            gap: 15px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Ajuste responsivo para o cabeçalho */
        @media (max-width: 650px) {
            .header-controls {
                flex-wrap: wrap;
            }
            .filter-score-group {
                position: static;
                transform: none;
                order: 3;
                width: 100%;
                justify-content: center;
                margin-top: 15px;
            }
        }

        .header-controls select, 
        .header-controls .back-btn, 
        .header-controls .score-board {
            height: 40px; 
            padding: 0 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color); 
            font-size: 0.95rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin: 0;
            font-family: inherit;
            transition: background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .header-controls select { cursor: pointer; outline: none; }
        .header-controls select:focus { border-color: var(--accent-color); }
        
        .header-controls .score-board { cursor: default; } 
        .header-controls .score-board span { color: var(--accent-color); margin: 0 4px; font-weight: 600; }

        .header-controls #themeToggle {
            font-size: 1.2rem; 
            background: transparent;
            border: none;
            color: var(--text-color); 
            cursor: pointer;
            padding: 10px;
            box-shadow: none;
        }
        .header-controls #themeToggle:hover { color: var(--accent-color); }

        .quiz-container {
            background-color: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 16px; 
            padding: 30px;
            text-align: center; 
            max-width: 550px; 
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            margin-top: 10px;
        }

        .quiz-container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .partitura-container {
            background-color: #ffffff;
            color: #000000 !important;
            border-radius: 12px;
            padding: 20px 10px;
            margin-bottom: 30px;
            min-height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .partitura-container svg {
            color: #000000 !important; fill: #000000 !important; max-width: 100%; height: auto;
        }

        .options-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 12px;
        }
        
        button { cursor: pointer; font-family: inherit; }
        
        .option-btn {
            background-color: var(--control-bg);
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            padding: 14px; 
            border-radius: 25px;
            transition: 0.2s; 
            font-weight: 600; 
            font-size: 1.05rem;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) { 
            border-color: var(--accent-color); 
            background-color: var(--hover-color); 
        }
        .option-btn.correct { background-color: var(--correct); color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--incorrect); color: white; border-color: var(--incorrect); }
        
        .timer-bar {
            height: 4px; background-color: var(--accent-color); width: 0%; 
            transition: width 1.5s linear; margin-top: 25px; border-radius: 2px; display: none;
            opacity: 0.5;
        }

        footer {
            margin-top: auto; padding: 30px 20px 10px; text-align: center;
            font-size: 0.9rem; color: var(--text-color); opacity: 0.6; width: 100%;
        }
        footer a { color: var(--accent-color); text-decoration: none; font-weight: bold; transition: opacity 0.3s; }
        footer a:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-controls">
        <a href="index.html" class="back-btn">← Voltar</a>
        
        <div class="filter-score-group">
            <select id="filtroModulo" onchange="salvarFiltroEAtualizar()">
                <option value="todas">Todas as Claves</option>
                <option value="treble">Apenas Clave de Sol</option>
                <option value="bass">Apenas Clave de Fá</option>
                <option value="alto">Apenas Clave de Dó</option>
            </select>
            
            <div class="score-board">
                Acertos: <span id="pontosAcertos">0</span> / <span id="pontosTotal">0</span>
            </div>
        </div>

        <button id="themeToggle" title="Alternar Tema">☀</button>
    </div>

    <div class="quiz-container">
        <h2>Identifique a Nota Musical</h2>
        
        <div class="partitura-container" id="partitura"></div>
        <div class="options-grid" id="containerOpcoes"></div>
        
        <div id="timerBar" class="timer-bar"></div>
    </div>

    <footer>
        Desenvolvido por Ana Misque | Siga no Instagram: <a href="https://instagram.com/anamisque" target="_blank" rel="noopener noreferrer">@anamisque</a>
    </footer>

    <script>
        const themeBtn = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀'; 
        } else {
            themeBtn.innerText = '☾';
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.innerText = newTheme === 'dark' ? '☀' : '☾'; 
        });

        const filtroSelect = document.getElementById('filtroModulo');
        const filtroSalvo = localStorage.getItem('filtroClaves') || 'todas';
        filtroSelect.value = filtroSalvo;

        // Base de Dados com notas limitadas a até 3 linhas suplementares
        const baseDados = [
            // --- Clave de Sol (De Fá 3 a Mi 6) ---
            { clef: 'treble', abc: 'F,', resposta: 'Fá' }, { clef: 'treble', abc: 'G,', resposta: 'Sol' }, 
            { clef: 'treble', abc: 'A,', resposta: 'Lá' }, { clef: 'treble', abc: 'B,', resposta: 'Si' },
            { clef: 'treble', abc: 'C', resposta: 'Dó' }, { clef: 'treble', abc: 'D', resposta: 'Ré' }, 
            { clef: 'treble', abc: 'E', resposta: 'Mi' }, { clef: 'treble', abc: 'F', resposta: 'Fá' }, 
            { clef: 'treble', abc: 'G', resposta: 'Sol' }, { clef: 'treble', abc: 'A', resposta: 'Lá' }, 
            { clef: 'treble', abc: 'B', resposta: 'Si' }, { clef: 'treble', abc: 'c', resposta: 'Dó' }, 
            { clef: 'treble', abc: 'd', resposta: 'Ré' }, { clef: 'treble', abc: 'e', resposta: 'Mi' }, 
            { clef: 'treble', abc: 'f', resposta: 'Fá' }, { clef: 'treble', abc: 'g', resposta: 'Sol' }, 
            { clef: 'treble', abc: 'a', resposta: 'Lá' }, { clef: 'treble', abc: 'b', resposta: 'Si' },
            { clef: 'treble', abc: "c'", resposta: 'Dó' }, { clef: 'treble', abc: "d'", resposta: 'Ré' }, 
            { clef: 'treble', abc: "e'", resposta: 'Mi' },

            // --- Clave de Fá (De Lá 1 a Sol 4) ---
            { clef: 'bass', abc: 'A,,', resposta: 'Lá' }, { clef: 'bass', abc: 'B,,', resposta: 'Si' },
            { clef: 'bass', abc: 'C,', resposta: 'Dó' }, { clef: 'bass', abc: 'D,', resposta: 'Ré' }, 
            { clef: 'bass', abc: 'E,', resposta: 'Mi' }, { clef: 'bass', abc: 'F,', resposta: 'Fá' }, 
            { clef: 'bass', abc: 'G,', resposta: 'Sol' }, { clef: 'bass', abc: 'A,', resposta: 'Lá' }, 
            { clef: 'bass', abc: 'B,', resposta: 'Si' }, { clef: 'bass', abc: 'C', resposta: 'Dó' }, 
            { clef: 'bass', abc: 'D', resposta: 'Ré' }, { clef: 'bass', abc: 'E', resposta: 'Mi' }, 
            { clef: 'bass', abc: 'F', resposta: 'Fá' }, { clef: 'bass', abc: 'G', resposta: 'Sol' },

            // --- Clave de Dó (De Sol 2 a Fá 5) ---
            { clef: 'alto', abc: 'G,,', resposta: 'Sol' }, { clef: 'alto', abc: 'A,,', resposta: 'Lá' }, 
            { clef: 'alto', abc: 'B,,', resposta: 'Si' }, { clef: 'alto', abc: 'C,', resposta: 'Dó' }, 
            { clef: 'alto', abc: 'D,', resposta: 'Ré' }, { clef: 'alto', abc: 'E,', resposta: 'Mi' }, 
            { clef: 'alto', abc: 'F,', resposta: 'Fá' }, { clef: 'alto', abc: 'G,', resposta: 'Sol' }, 
            { clef: 'alto', abc: 'A,', resposta: 'Lá' }, { clef: 'alto', abc: 'B,', resposta: 'Si' },
            { clef: 'alto', abc: 'C', resposta: 'Dó' }, { clef: 'alto', abc: 'D', resposta: 'Ré' }, 
            { clef: 'alto', abc: 'E', resposta: 'Mi' }, { clef: 'alto', abc: 'F', resposta: 'Fá' }, 
            { clef: 'alto', abc: 'G', resposta: 'Sol' }, { clef: 'alto', abc: 'A', resposta: 'Lá' }, 
            { clef: 'alto', abc: 'B', resposta: 'Si' }, { clef: 'alto', abc: 'c', resposta: 'Dó' }, 
            { clef: 'alto', abc: 'd', resposta: 'Ré' }, { clef: 'alto', abc: 'e', resposta: 'Mi' }, 
            { clef: 'alto', abc: 'f', resposta: 'Fá' }
        ];

        const nomesNotas = ['Dó', 'Ré', 'Mi', 'Fá', 'Sol', 'Lá', 'Si'];

        let questaoAtual = null;
        let acertos = 0; let total = 0; let timeoutId = null;

        function salvarFiltroEAtualizar() {
            localStorage.setItem('filtroClaves', filtroSelect.value);
            acertos = 0; total = 0;
            atualizarPlacarDOM();
            carregarQuestao();
        }

        function atualizarPlacarDOM() {
            document.getElementById('pontosAcertos').innerText = acertos;
            document.getElementById('pontosTotal').innerText = total;
        }

        function carregarQuestao() {
            clearTimeout(timeoutId);
            const timerBar = document.getElementById('timerBar');
            timerBar.style.display = 'none'; timerBar.style.width = '0%';

            const filtro = filtroSelect.value;
            let conjuntoFiltro = baseDados;
            
            if (filtro !== 'todas') {
                conjuntoFiltro = baseDados.filter(item => item.clef === filtro);
            }

            let novaQuestao;
            do {
                novaQuestao = conjuntoFiltro[Math.floor(Math.random() * conjuntoFiltro.length)];
            } while (conjuntoFiltro.length > 1 && novaQuestao === questaoAtual);
            questaoAtual = novaQuestao;

            // Renderiza a partitura limitando o uso de espaço em branco desnecessário (staffwidth)
            const abcString = `
X:1
T:
M:none
L:1/1
K:C clef=${questaoAtual.clef}
${questaoAtual.abc} |]`;
            
            ABCJS.renderAbc("partitura", abcString, { 
                add_classes: true, scale: 1.8, staffwidth: 150, foregroundColor: "#000000" 
            });

            const containerOpcoes = document.getElementById('containerOpcoes');
            containerOpcoes.innerHTML = '';

            nomesNotas.forEach(nota => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = nota;
                btn.onclick = () => verificarResposta(btn, nota);
                containerOpcoes.appendChild(btn);
            });
        }

        function verificarResposta(botaoClicado, notaEscolhida) {
            const botoes = document.querySelectorAll('.option-btn');
            const isCorrect = (notaEscolhida === questaoAtual.resposta);
            
            botoes.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === questaoAtual.resposta) {
                    btn.classList.add('correct');
                }
            });

            total++;
            if (isCorrect) {
                acertos++;
            } else {
                botaoClicado.classList.add('wrong');
            }

            atualizarPlacarDOM();

            const timerBar = document.getElementById('timerBar');
            timerBar.style.display = 'block';
            setTimeout(() => { timerBar.style.width = '100%'; }, 50);

            timeoutId = setTimeout(carregarQuestao, 1500);
        }

        window.onload = carregarQuestao;
    </script>
</body>
</html>
