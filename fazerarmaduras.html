<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento: Acidentes das Escalas</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f4f4f9; --text-color: #333333; --accent-color: #ff00ff;
            --card-bg: #ffffff; --border-color: #eaeaea; --hover-color: #fdf0fd;
            --control-bg: #f8f9fa; --correct: #28a745; --incorrect: #dc3545;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e;
            --border-color: #2c2c2c; --hover-color: #3a1c3a; --control-bg: #2a2a2a;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color);
            color: var(--text-color); margin: 0; padding: 20px; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s;
        }
        
        .header-controls {
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; max-width: 800px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .filter-score-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .header-controls select, 
        .header-controls .back-btn, 
        .header-controls .score-board, 
        .header-controls #themeToggle {
            height: 40px;
            padding: 0 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg); 
            color: var(--text-color); 
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin: 0;
            font-family: inherit;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .header-controls select { cursor: pointer; }
        .header-controls select:focus { outline: none; border-color: var(--accent-color); }
        
        .header-controls .score-board { cursor: default; }
        .header-controls .score-board span { color: var(--accent-color); margin: 0 4px; font-weight: 600; }

        .header-controls #themeToggle {
            font-size: 1.2rem;
            border: none;
            color: var(--text-color);
            background: transparent;
            cursor: pointer;
            box-shadow: none;
        }
        .header-controls #themeToggle:hover { color: var(--accent-color); }

        .quiz-container {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 30px; text-align: center; max-width: 600px; width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-top: 10px;
        }

        /* Novo estilo para o texto da escala */
        .escala-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 30px 0;
        }

        /* Grade com 4 opções (2x2) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (max-width: 560px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        
        button { cursor: pointer; font-family: inherit; }
        .option-btn {
            background-color: var(--control-bg); border: 1px solid var(--border-color); color: var(--text-color);
            padding: 12px; border-radius: 16px; transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 84px;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--accent-color); background-color: var(--hover-color); }
        .option-btn.correct { background-color: var(--correct); color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--incorrect); color: white; border-color: var(--incorrect); }

        .option-btn img {
            width: 100%;
            max-width: 170px;
            height: auto;
            border-radius: 8px;
            background: #fff;
        }
        
        /* Barra de progresso visual para o timer (opcional) */
        .timer-bar {
            height: 4px; background-color: var(--accent-color); width: 0%; 
            transition: width 1.5s linear; margin-top: 20px; border-radius: 2px;
            display: none;
            opacity: 0.5;
        }

        footer {
            margin-top: auto; padding: 30px 20px 10px; text-align: center;
            font-size: 0.9rem; color: var(--text-color); opacity: 0.6; width: 100%;
        }
        footer a { color: var(--accent-color); text-decoration: none; font-weight: bold; transition: opacity 0.3s; }
        footer a:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-controls">
        <a href="index.html" class="back-btn">← Voltar</a>
        
        <div class="filter-score-group">
            <select id="filtroModulo" onchange="carregarQuestao();">
                <option value="ambos">Ambos (Sustenidos e Bemóis)</option>
                <option value="sustenidos">Apenas Sustenidos</option>
                <option value="bemois">Apenas Bemóis</option>
            </select>
            
            <div class="score-board">
                Acertos: <span id="pontosAcertos">0</span> / <span id="pontosTotal">0</span>
            </div>
        </div>

        <button id="themeToggle" title="Alternar Tema">☾</button>
    </div>

    <div class="quiz-container">
        <h2>Quais são os acidentes desta escala?</h2>
        
        <div id="textoQuestao" class="escala-display"></div>

        <div class="options-grid" id="containerOpcoes"></div>
        <div id="timerBar" class="timer-bar"></div>
    </div>

    <footer>
        Desenvolvido por Ana Misque | Siga no Instagram: <a href="https://instagram.com/anamisque" target="_blank" rel="noopener noreferrer">@anamisque</a>
    </footer>

    <script>
        const themeBtn = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀'; 
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.innerText = newTheme === 'dark' ? '☀' : '☾'; 
        });

        // Nova base de dados com as escalas e a ordem correta dos acidentes
        const baseDados = [
            { escala: 'Dó Maior', resposta: 'Sem alterações', tipo: 'todos', imagem: 'Armaduras - Sustenido/DoMaior.png' },
            
            // Sustenidos (Ordem: Fá, Dó, Sol, Ré, Lá, Mi, Si)
            { escala: 'Sol Maior', resposta: 'Fá#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/SolMaior.png' },
            { escala: 'Ré Maior', resposta: 'Fá#, Dó#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/ReMaior.png' },
            { escala: 'Lá Maior', resposta: 'Fá#, Dó#, Sol#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/LaMaior.png' },
            { escala: 'Mi Maior', resposta: 'Fá#, Dó#, Sol#, Ré#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/MiMaior.png' },
            { escala: 'Si Maior', resposta: 'Fá#, Dó#, Sol#, Ré#, Lá#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/SiMaior.png' },
            { escala: 'Fá# Maior', resposta: 'Fá#, Dó#, Sol#, Ré#, Lá#, Mi#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/FaSusMaior.png' },
            { escala: 'Dó# Maior', resposta: 'Fá#, Dó#, Sol#, Ré#, Lá#, Mi#, Si#', tipo: 'sustenidos', imagem: 'Armaduras - Sustenido/DoSusMaior.png' },
            
            // Bemóis (Ordem: Si, Mi, Lá, Ré, Sol, Dó, Fá)
            { escala: 'Fá Maior', resposta: 'Sib', tipo: 'bemois', imagem: 'Armaduras - Bemóis/FaMaior.png' },
            { escala: 'Si Bemol Maior', resposta: 'Sib, Mib', tipo: 'bemois', imagem: 'Armaduras - Bemóis/SibMaior.png' },
            { escala: 'Mi Bemol Maior', resposta: 'Sib, Mib, Láb', tipo: 'bemois', imagem: 'Armaduras - Bemóis/MibMaior.png' },
            { escala: 'Lá Bemol Maior', resposta: 'Sib, Mib, Láb, Réb', tipo: 'bemois', imagem: 'Armaduras - Bemóis/LabMaior.png' },
            { escala: 'Ré Bemol Maior', resposta: 'Sib, Mib, Láb, Réb, Solb', tipo: 'bemois', imagem: 'Armaduras - Bemóis/RebMaior.png' },
            { escala: 'Sol Bemol Maior', resposta: 'Sib, Mib, Láb, Réb, Solb, Dób', tipo: 'bemois', imagem: 'Armaduras - Bemóis/SolbMaior.png' },
            { escala: 'Dó Bemol Maior', resposta: 'Sib, Mib, Láb, Réb, Solb, Dób, Fáb', tipo: 'bemois', imagem: 'Armaduras - Bemóis/DobMaior.png' }
        ];

        let questaoAtual = null;
        let questaoAnterior = null;
        let acertos = 0;
        let total = 0;
        let timeoutId = null;
        const PLACAR_STORAGE_KEY = 'fazerarmaduras_placar_v1';

        function salvarPlacarLocal() {
            localStorage.setItem(PLACAR_STORAGE_KEY, JSON.stringify({ acertos, total }));
        }

        function carregarPlacarLocal() {
            const placarSalvo = localStorage.getItem(PLACAR_STORAGE_KEY);
            if (!placarSalvo) return;

            try {
                const dados = JSON.parse(placarSalvo);
                acertos = Number.isFinite(dados.acertos) ? dados.acertos : 0;
                total = Number.isFinite(dados.total) ? dados.total : 0;
            } catch {
                acertos = 0;
                total = 0;
            }
        }

        function embaralhar(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function resetarPlacar() {
            acertos = 0;
            total = 0;
            atualizarPlacarDOM();
            questaoAnterior = null;
            clearTimeout(timeoutId);
        }

        function atualizarPlacarDOM() {
            document.getElementById('pontosAcertos').innerText = acertos;
            document.getElementById('pontosTotal').innerText = total;
            salvarPlacarLocal();
        }

        function carregarQuestao() {
            // Reseta a barra de tempo
            const timerBar = document.getElementById('timerBar');
            timerBar.style.display = 'none';
            timerBar.style.width = '0%';

            const filtro = document.getElementById('filtroModulo').value;
            
            // Filtra permitindo que 'Dó Maior' (tipo 'todos') apareça sempre
            let conjuntoFiltro = baseDados.filter(item => 
                filtro === 'ambos' || item.tipo === filtro || item.tipo === 'todos'
            );

            let novaQuestao;
            do {
                novaQuestao = conjuntoFiltro[Math.floor(Math.random() * conjuntoFiltro.length)];
            } while (conjuntoFiltro.length > 1 && novaQuestao === questaoAnterior);

            questaoAtual = novaQuestao;
            questaoAnterior = questaoAtual;
            
            // Exibe o nome da escala
            document.getElementById('textoQuestao').innerText = questaoAtual.escala;

            // Pega 3 respostas erradas aleatórias sem misturar bemóis/sustenidos
            let conjuntoDistratores;
            if (questaoAtual.tipo === 'todos') {
                conjuntoDistratores = conjuntoFiltro.filter(item => item.escala !== questaoAtual.escala);
            } else {
                conjuntoDistratores = conjuntoFiltro.filter(item =>
                    item.escala !== questaoAtual.escala && (item.tipo === questaoAtual.tipo || item.tipo === 'todos')
                );
            }

            let outrasOpcoes = conjuntoDistratores;
            outrasOpcoes = embaralhar(outrasOpcoes).slice(0, 3);

            let todasOpcoes = [...outrasOpcoes, questaoAtual];
            todasOpcoes = embaralhar(todasOpcoes);

            const containerOpcoes = document.getElementById('containerOpcoes');
            containerOpcoes.innerHTML = '';

            todasOpcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.dataset.escala = opcao.escala;

                const imagem = document.createElement('img');
                imagem.src = opcao.imagem;
                imagem.alt = `Armadura de ${opcao.escala}`;

                btn.appendChild(imagem);
                btn.onclick = () => verificarResposta(btn, opcao.escala === questaoAtual.escala);
                containerOpcoes.appendChild(btn);
            });
        }

        function verificarResposta(botaoClicado, isCorrect) {
            const botoes = document.querySelectorAll('.option-btn');
            
            // Trava os botões e pinta as respostas
            botoes.forEach(btn => {
                btn.disabled = true;
                if (btn.dataset.escala === questaoAtual.escala) {
                    btn.classList.add('correct');
                }
            });

            total++;

            if (isCorrect) {
                acertos++;
            } else {
                botaoClicado.classList.add('wrong');
            }

            atualizarPlacarDOM();

            // Animação visual opcional para mostrar que vai avançar
            const timerBar = document.getElementById('timerBar');
            timerBar.style.display = 'block';
            setTimeout(() => { timerBar.style.width = '100%'; }, 50);

            // Avança automaticamente após 1.5 segundos
            timeoutId = setTimeout(carregarQuestao, 500);
        }

        window.onload = () => {
            carregarPlacarLocal();
            atualizarPlacarDOM();
            carregarQuestao();
        };
    </script>
</body>
</html>
